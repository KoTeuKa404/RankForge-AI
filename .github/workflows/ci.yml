name: RankForge CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: rankforge-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install locked dependencies
        run: npm ci --no-audit --no-fund

      - name: Build, test and audit
        id: validation
        shell: bash
        run: |
          set +e
          npm run check > rankforge-ci.log 2>&1
          status=$?
          tail -n 120 rankforge-ci.log
          exit $status

      - name: Upload validation log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rankforge-ci-log
          path: rankforge-ci.log
          if-no-files-found: error
