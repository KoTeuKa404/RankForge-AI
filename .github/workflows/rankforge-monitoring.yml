name: RankForge monitoring trigger

on:
  schedule:
    - cron: "17 * * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  trigger:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Run due RankForge monitors
        env:
          RANKFORGE_MONITOR_URL: ${{ secrets.RANKFORGE_MONITOR_URL }}
          RANKFORGE_MONITOR_TOKEN: ${{ secrets.RANKFORGE_MONITOR_TOKEN }}
        run: |
          set -euo pipefail
          test -n "$RANKFORGE_MONITOR_URL"
          test -n "$RANKFORGE_MONITOR_TOKEN"
          curl --fail-with-body --silent --show-error \
            --max-time 240 \
            --retry 2 \
            --retry-all-errors \
            -X POST \
            -H "Authorization: Bearer $RANKFORGE_MONITOR_TOKEN" \
            -H "Content-Type: application/json" \
            "$RANKFORGE_MONITOR_URL/api/system/run-monitors"
